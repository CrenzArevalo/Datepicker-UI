<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Datepicker UI | Frontend Project</title>

    <meta name="description" content="A custom datepicker UI built using HTML, CSS, and JavaScript.">
    <meta name="keywords" content="datepicker, HTML, CSS, JavaScript, UI design">
    <meta name="author" content="Crenz Arevalo">
    <link rel="stylesheet" href="style.css">
</head> <body> <div class="datepicker-container">
        <div class="input-group">
            <input type="text" placeholder="dd / mm / yyyy">
            <button type="button" class="calendar-btn">📅</button>
        </div>

        <div class="calendar-dropdown">
            <header class="calendar-header">
                <button type="button">&lt;</button>
                <span>December 2026</span>
                <button type="button">&gt;</button>
            </header>

            <table>
               <thead>
                    <tr>
                        <th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td></td><td></td><td></td><td></td><td>1</td><td>2</td><td>3</td>
                    </tr>
                    <tr>
                        <td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td>
                    </tr>
                    <tr>
                        <td>11</td><td>12</td><td>13</td><td>14</td><td>15</td><td>16</td><td>17</td>
                    </tr>
                    <tr>
                        <td>18</td><td>19</td><td>20</td><td>21</td><td>22</td><td>23</td><td>24</td>
                    </tr>
                    <tr>
                        <td>25</td><td>26</td><td>27</td><td>28</td><td>29</td><td>30</td><td>31</td>
                    </tr>
                </tbody> 
            </table>
        </div>
    </div>
</body>
</html>
